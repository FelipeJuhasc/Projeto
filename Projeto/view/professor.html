<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professores</title>
    <link rel="stylesheet" href="../index.css">
    <script src="./controleAcesso.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { display: flex; min-height: 100vh; background: #f4f6f8; }

        .content { flex: 1; padding: 30px; }
        .content h1 { margin-bottom: 20px; color: #2c3e50; }
        .content-section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,.1);
        }

        .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .toolbar input[type="text"] {
            flex: 1;
            min-width: 180px;
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }
        .toolbar input:focus { border-color: #2196F3; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn {
            padding: 8px 14px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-novo     { background: #4CAF50; color: white; }
        .btn-editar   { background: #2196F3; color: white; }
        .btn-excluir  { background: #f44336; color: white; }
        .btn-exportar { background: #FF9800; color: white; }
        .btn:hover    { opacity: .88; }
        .btn:disabled {
            background: #ccc;
            color: #888;
            cursor: not-allowed;
            opacity: .7;
        }

        .professor-item {
            padding: 12px 14px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            border-radius: 4px;
            border-left: 3px solid transparent;
            transition: background .15s;
        }
        .professor-item:hover       { background: #f5f5f5; }
        .professor-item.selecionado { background: #e8f0fe; border-left-color: #2196F3; }
        .professor-item strong      { font-size: 15px; color: #333; }
        .professor-item small       { color: #777; font-size: 13px; }
        .lista-vazia { color: #999; text-align: center; padding: 30px; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h2 style="color: white; padding: 20px;">Unoeste</h2>
        <ul>
            <li><a href="./professor.html"  class="menu-item"><span onclick="toprofessor()">Professor</span></a></li>
            <li><a href="./cursoView.html"  class="menu-item"><span onclick="toCurso()">Cursos</span></a></li>
            <li><a href="./listaview.html"  class="menu-item"><span onclick="toLista()">Disciplina</span></a></li>
            <li><a href="./usuarioView.html" class="menu-item"><span onclick="toUsuario()">Usuários</span></a></li>
            <li ><a href="#" class="menu-item" onclick="logout()"><span>🚪 Sair (Logout)</span></a></li>
        </ul>
    </div>

    <div class="content">
        <h1>Lista de Professores</h1>
        <div class="content-section">

            <div class="toolbar">
                <input type="text" id="search-input"
                       placeholder="Buscar professor pelo nome..."
                       oninput="filtrarProfessores()" />
                <div class="btn-group">
                    <button class="btn btn-novo"     onclick="novoProfessor()">+ Novo</button>
                    <button class="btn btn-editar"   onclick="editarProfessor()"  id="btn-editar"  disabled>Editar</button>
                    <button class="btn btn-excluir"  onclick="excluirProfessor()" id="btn-excluir" disabled>Excluir</button>
                    <button class="btn btn-exportar" onclick="exportarTXT()">⬇ Exportar TXT</button>
                </div>
            </div>
            <!-- THE NEW MODAL BOX DIALOG LAYER -->
<div id="professor-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; padding: 25px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
        <h2 id="modal-title" style="margin-bottom: 20px; color: #2c3e50;">Adicionar Professor</h2>
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">Nome Completo:</label>
            <input type="text" id="modal-nome" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">Graduação:</label>
            <select id="modal-graduacao" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                <option value="Especialista">Especialista</option>
                <option value="Mestre">Mestre</option>
                <option value="Doutor">Doutor</option>
            </select>
        </div>

        <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" id="modal-ativo" checked style="width: auto;">
            <label for="modal-ativo" style="font-weight: 500;">Professor Ativo no Sistema</label>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <button class="btn" style="background: #e0e0e0; color: #333;" onclick="fecharModal()">Cancelar</button>
            <button class="btn btn-novo" id="btn-salvar-modal" onclick="salvarFormularioModal()">Salvar</button>
        </div>
    </div>
</div>


            
            <div id="professor-list"></div>
        </div>
    </div>

        <!-- COMBINED APPLICATION SCRIPTS (ROUTER, MODEL, CONTROLLER, VIEW) -->
    <script>
        // ==========================================
        // 1) ROUTER
        // ==========================================
        class Router {
            constructor() { this._rotas = {}; }
            registrar(rota, fn) { this._rotas[rota] = fn; }
            async enviar(rota, dados) {
                const fn = this._rotas[rota];
                if (!fn) { console.error('[Router] Rota não encontrada:', rota); return null; }
                return await fn(dados);
            }
        }
        window.router = new Router();

        // ==========================================
        // 2) MODEL
        // ==========================================
        class Professor {
            constructor(id, nome, graduacao, ativo) {
                this._id        = id;
                this._nome      = nome;
                this._graduacao = graduacao;
                this._ativo     = ativo;
            }
            get id()        { return this._id; }
            get nome()      { return this._nome; }
            get graduacao() { return this._graduacao; }
            get ativo()     { return this._ativo; }
            
            set nome(v)      { if (v && v.trim().length > 1) this._nome = v.trim(); }
            set graduacao(v) { if (v && v.trim().length > 1) this._graduacao = v.trim(); }
            set ativo(v)     { this._ativo = !!v; }
        }
        window.Professor = Professor;

        // ==========================================
        // 3) CONTROLLER
        // ==========================================
        class ProfessorController {
            constructor() {
                this._apiUrl = 'http://localhost:3000/api/professores';
                this._registrarRotas();
            }

            _registrarRotas() {
                router.registrar('professor/listar',      async (termo)   => await this.getAll(termo));
                router.registrar('professor/buscarPorId', async (id)      => await this.buscarPorId(id));
                router.registrar('professor/adicionar',   async (dados)   => await this.adicionar(dados));
                router.registrar('professor/atualizar',   async (payload) => await this.atualizar(payload.id, payload.dados));
                router.registrar('professor/excluir',     async (id)      => await this.excluir(id));
            }

            async getAll(termo = '') {
                try {
                    const url = termo ? `${this._apiUrl}?termo=${termo}` : this._apiUrl;
                    const res = await fetch(url);
                    const data = await res.json();
                    return data.map(p => new Professor(p._id, p.nome, p.graduacao, p.ativo));
                } catch (err) {
                    console.error('Erro ao buscar professores do banco:', err);
                    return [];
                }
            }

            async buscarPorId(id) {
                try {
                    const res = await fetch(`${this._apiUrl}/${id}`);
                    const p = await res.json();
                    return p ? new Professor(p._id, p.nome, p.graduacao, p.ativo) : null;
                } catch (err) {
                    console.error('Erro ao buscar professor por ID:', err);
                    return null;
                }
            }

            async adicionar({ nome, graduacao, ativo }) {
                try {
                    const res = await fetch(this._apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nome, graduacao, ativo })
                    });
                    const p = await res.json();
                    return new Professor(p._id, p.nome, p.graduacao, p.ativo);
                } catch (err) {
                    console.error('Erro ao adicionar professor:', err);
                    return null;
                }
            }

            async atualizar(id, dados) {
                try {
                    const res = await fetch(`${this._apiUrl}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dados)
                    });
                    return res.ok;
                } catch (err) {
                    console.error('Erro ao atualizar professor:', err);
                    return false;
                }
            }

            async excluir(id) {
                try {
                    const res = await fetch(`${this._apiUrl}/${id}`, {
                        method: 'DELETE'
                    });
                    return res.ok;
                } catch (err) {
                    console.error('Erro ao excluir professor:', err);
                    return false;
                }
            }
        }
        window.professorController = new ProfessorController();

        // ==========================================
        // 4) VIEW
        // ==========================================
                // ==========================================
        // 4) VIEW WITH CUSTOM FORM MODAL DIALOGS
        // ==========================================
        let selecionadoId = null;
        let modoModal = 'adicionar'; // Can be 'adicionar' or 'editar'

        const BADGE = {
            adm:    '<span class="badge badge-adm">ADM</span>',
            edicao: '<span class="badge badge-edicao">Edição</span>',
            visao:  '<span class="badge badge-visao">Visão</span>'
        };

        async function renderProfessores(lista) {
            const container = document.getElementById('professor-list');
            container.innerHTML = '';
            
            if (!lista || lista.length === 0) {
                container.innerHTML = '<p class="lista-vazia">Nenhum professor encontrado.</p>';
                return;
            }

            lista.forEach(prof => {
                const div = document.createElement('div');
                div.className = 'professor-item' + (prof.id === selecionadoId ? ' selecionado' : '');
                
                const statusTexto = prof.ativo ? 'Ativo' : 'Inativo';
                const statusCor = prof.ativo ? '#1a7a42' : '#c0392b';

                div.innerHTML = `
                    <strong>${prof.nome}</strong> 
                    <span style="font-size: 11px; font-weight: bold; color: ${statusCor}; margin-left: 8px;">(${statusTexto})</span>
                    <br><small>Graduação: ${prof.graduacao} | ID: ${prof.id}</small>
                `;
                div.onclick = () => selecionarProfessor(prof.id);
                container.appendChild(div);
            });
        }

        function selecionarProfessor(id) {
            selecionadoId = (selecionadoId === id) ? null : id;
            atualizarBotoes();
            filtrarProfessores();
        }

        function atualizarBotoes() {
            const hab = selecionadoId !== null;
            document.getElementById('btn-editar').disabled  = !hab;
            document.getElementById('btn-excluir').disabled = !hab;
        }

        async function filtrarProfessores() {
            const termo = document.getElementById('search-input').value;
            const lista = await router.enviar('professor/listar', termo);
            renderProfessores(lista);
        }

        // --- NEW MODAL CONTROLLER INTERFACES ---
        function abrirModal(modo) {
            modoModal = modo;
            document.getElementById('professor-modal').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('professor-modal').style.display = 'none';
            // Clear entry inputs
            document.getElementById('modal-nome').value = '';
            document.getElementById('modal-graduacao').value = 'Especialista';
            document.getElementById('modal-ativo').checked = true;
        }

        function novoProfessor() {
            const permissao = localStorage.getItem('usuarioPermissao');
            if (permissao === 'visao' || permissao === 'edicao') {
                alert('Seu nível de acesso não permite adicionar registros.');
                return;
            }
            document.getElementById('modal-title').innerText = "Adicionar Professor";
            abrirModal('adicionar');
        }

        async function editarProfessor() {
            const permissao = localStorage.getItem('usuarioPermissao');
            if (permissao === 'visao') {
                alert('Seu nível de acesso não permite editar registros.');
                return;
            }
            if (!selecionadoId) return;

            const prof = await router.enviar('professor/buscarPorId', selecionadoId);
            if (!prof) return;

            // Populate modal field properties
            document.getElementById('modal-title').innerText = "Editar Professor";
            document.getElementById('modal-nome').value = prof.nome;
            document.getElementById('modal-graduacao').value = prof.graduacao;
            document.getElementById('modal-ativo').checked = prof.ativo;

            abrirModal('editar');
        }

        async function salvarFormularioModal() {
            const nome = document.getElementById('modal-nome').value.trim();
            const graduacao = document.getElementById('modal-graduacao').value;
            const ativo = document.getElementById('modal-ativo').checked;

            if (!nome) {
                alert('O nome completo do professor é obrigatório.');
                return;
            }

            if (modoModal === 'adicionar') {
                const novo = await router.enviar('professor/adicionar', { nome, graduacao, ativo });
                if (novo) alert(`Professor "${novo.nome}" adicionado com sucesso!`);
            } else if (modoModal === 'editar') {
                await router.enviar('professor/atualizar', { 
                    id: selecionadoId, 
                    dados: { nome, graduacao, ativo } 
                });
            }

            fecharModal();
            await filtrarProfessores();
        }

        async function excluirProfessor() {
            if (!selecionadoId) return;
            const permissao = localStorage.getItem('usuarioPermissao');
            if (permissao === 'visao' || permissao === 'edicao') {
                alert('Seu nível de acesso não permite excluir registros.');
                return;
            }

            const prof = await router.enviar('professor/buscarPorId', selecionadoId);
            if (!prof) return;

            if (confirm(`Excluir o professor "${prof.nome}" permanentemente do MongoDB?`)) {
                await router.enviar('professor/excluir', selecionadoId);
                selecionadoId = null;
                atualizarBotoes();
                await filtrarProfessores();
            }
        }

        async function exportarTXT() {
            const termo = document.getElementById('search-input').value;
            const lista = await router.enviar('professor/listar', termo);

            if (!lista || lista.length === 0) {
                alert('Nenhum professor para exportar.');
                return;
            }

            const linhas = [
                'ID\tNome\tGraduação\tStatus',
                ...lista.map(p => `${p.id}\t${p.nome}\t${p.graduacao}\t${p.ativo ? 'Ativo' : 'Inativo'}`)
            ];

            const conteudo = linhas.join('\r\n');

            const blob = new Blob([conteudo], { type: 'text/plain;charset=utf-8' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');

            const dataHoje = new Date().toISOString().slice(0, 10);
            a.href     = url;
            a.download = `professores_${dataHoje}.txt`;
            a.click();

            URL.revokeObjectURL(url);
        }

        document.addEventListener('DOMContentLoaded', filtrarProfessores);



        
    </script>

</body>
</html>
