<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos</title>
    <link rel="stylesheet" href="../index.css">
    <script src="./controleAcesso.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { display: flex; min-height: 100vh; background: #f4f6f8; }

        .content { flex: 1; padding: 30px; }
        .content h1 { margin-bottom: 20px; color: #2c3e50; }
        .content-section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,.1);
        }

        .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .toolbar input[type="text"] {
            flex: 1;
            min-width: 180px;
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }
        .toolbar input:focus { border-color: #2196F3; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn {
            padding: 8px 14px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-novo     { background: #4CAF50; color: white; }
        .btn-editar   { background: #2196F3; color: white; }
        .btn-excluir  { background: #f44336; color: white; }
        .btn-exportar { background: #FF9800; color: white; }
        .btn:hover    { opacity: .88; }
        .btn:disabled {
            background: #ccc;
            color: #888;
            cursor: not-allowed;
            opacity: .7;
        }

        .curso-item {
            padding: 12px 14px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            border-radius: 4px;
            border-left: 3px solid transparent;
            transition: background .15s;
        }
        .curso-item:hover       { background: #f5f5f5; }
        .curso-item.selecionado { background: #e8f0fe; border-left-color: #2196F3; }
        .curso-item strong      { font-size: 15px; color: #333; }
        .curso-item small       { color: #777; font-size: 13px; }
        .lista-vazia { color: #999; text-align: center; padding: 30px; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h2 style="color: white; padding: 20px;">Unoeste</h2>
        <ul>
            <li><a href="./professor.html"  class="menu-item"><span onclick="toprofessor()">Professor</span></a></li>
            <li><a href="./cursoView.html"  class="menu-item"><span onclick="toCurso()">Cursos</span></a></li>
            <li><a href="./listaview.html"  class="menu-item"><span onclick="toLista()">Disciplina</span></a></li>
            <li><a href="./usuarioView.html" class="menu-item"><span onclick="toUsuario()">Usuários</span></a></li>

            <li ><a href="#" class="menu-item" onclick="logout()"><span>🚪 Sair (Logout)</span></a></li>
        </ul>
    </div>

    <div class="content">
        <h1>Lista de Cursos</h1>
        <div class="content-section">

            <div class="toolbar">
                <input type="text" id="search-input"
                       placeholder="Buscar curso pelo nome..."
                       oninput="filtrarCursos()" />
                <div class="btn-group">
                    <button class="btn btn-novo"     onclick="novoCurso()">+ Novo</button>
                    <button class="btn btn-editar"   onclick="editarCurso()"  id="btn-editar"  disabled>Editar</button>
                    <button class="btn btn-excluir"  onclick="excluirCurso()" id="btn-excluir" disabled>Excluir</button>
                    <button class="btn btn-exportar" onclick="exportarTXT()">⬇ Exportar TXT</button>
                </div>
            </div>

            <div id="curso-list"></div>
        </div>
    </div>
    <!-- MODAL DE FORMULÁRIO PARA CURSO -->
<div id="curso-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; padding: 25px; border-radius: 8px; width: 100%; max-width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto;">
        <h2 id="modal-title" style="margin-bottom: 20px; color: #2c3e50;">Adicionar Curso</h2>
        
        <div style="margin-bottom: 12px;">
            <label style="display: block; margin-bottom: 3px; font-weight: 500;">Nome/Instituição do Curso:</label>
            <input type="text" id="modal-CursoInst" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 12px;">
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 3px; font-weight: 500;">Início Inscrições:</label>
                <input type="date" id="modal-DTiniIncs" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required>
            </div>
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 3px; font-weight: 500;">Fim Inscrições:</label>
                <input type="date" id="modal-DTfimInsc" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 12px;">
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 3px; font-weight: 500;">Carga Horária Regular (h):</label>
                <input type="number" id="modal-CargaH" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required>
            </div>
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 3px; font-weight: 500;">Carga Horária TCC (h):</label>
                <input type="number" id="modal-CargaHTCC" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 12px;">
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 3px; font-weight: 500;">Código IESDE:</label>
                <input type="text" id="modal-Codiesde" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required>
            </div>
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 3px; font-weight: 500;">Grade IESDE:</label>
                <input type="text" id="modal-Gradeiesde" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 12px;">
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 3px; font-weight: 500;">Início Matrícula:</label>
                <input type="date" id="modal-IniMat" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required>
            </div>
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 3px; font-weight: 500;">Fim Matrícula:</label>
                <input type="date" id="modal-FimMat" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required>
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 3px; font-weight: 500;">Matrícula do Coordenador:</label>
            <input type="text" id="modal-Matcoord" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required>
        </div>

        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="modal-IniImediato" style="width: auto;">
                <label for="modal-IniImediato" style="font-weight: 500;">Início Imediato</label>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="modal-PasSeg" style="width: auto;">
                <label for="modal-PasSeg" style="font-weight: 500;">PagSeguro</label>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <button class="btn" style="background: #e0e0e0; color: #333;" onclick="fecharModal()">Cancelar</button>
            <button class="btn btn-novo" id="btn-salvar-modal" onclick="salvarFormularioModal()">Salvar</button>
        </div>
    </div>
</div>


        <!-- COMBINED APPLICATION SCRIPTS (ROUTER, MODEL, CONTROLLER, VIEW) -->
    <script>
        // ==========================================
        // 1) ROUTER
        // ==========================================
        class Router {
            constructor() { this._rotas = {}; }
            registrar(rota, fn) { this._rotas[rota] = fn; }
            async enviar(rota, dados) {
                const fn = this._rotas[rota];
                if (!fn) { console.error('[Router] Rota não encontrada:', rota); return null; }
                return await fn(dados);
            }
        }
        window.router = new Router();

        // ==========================================
        // 2) MODEL
        // ==========================================
        class Curso {
            constructor(id, DTiniIncs, DTfimInsc, CargaH, CargaHTCC, Codiesde, Gradeiesde, CursoInst, IniImediato, IniMat, FimMat, Matcoord, PasSeg) {
                this._id          = id;
                this._DTiniIncs   = DTiniIncs;
                this._DTfimInsc   = DTfimInsc;
                this._CargaH      = Number(CargaH);
                this._CargaHTCC   = Number(CargaHTCC);
                this._Codiesde    = Codiesde;
                this._Gradeiesde  = Gradeiesde;
                this._CursoInst   = CursoInst;
                this._IniImediato = !!IniImediato;
                this._IniMat      = IniMat;
                this._FimMat      = FimMat;
                this._Matcoord    = Matcoord;
                this._PasSeg      = !!PasSeg;
            }
            get id()          { return this._id; }
            get DTiniIncs()   { return this._DTiniIncs; }
            get DTfimInsc()   { return this._DTfimInsc; }
            get CargaH()      { return this._CargaH; }
            get CargaHTCC()   { return this._CargaHTCC; }
            get Codiesde()    { return this._Codiesde; }
            get Gradeiesde()  { return this._Gradeiesde; }
            get CursoInst()   { return this._CursoInst; }
            get IniImediato() { return this._IniImediato; }
            get IniMat()      { return this._IniMat; }
            get FimMat()      { return this._FimMat; }
            get Matcoord()    { return this._Matcoord; }
            get PasSeg()      { return this._PasSeg; }
        }
        window.Curso = Curso;

        // ==========================================
        // 3) CONTROLLER
        // ==========================================
        class CursoController {
            constructor() {
                this._apiUrl = 'http://localhost:3000/api/cursos';
                this._registrarRotas();
            }

            _registrarRotas() {
                router.registrar('curso/listar',      async (termo)   => await this.getAll(termo));
                router.registrar('curso/buscarPorId', async (id)      => await this.buscarPorId(id));
                router.registrar('curso/adicionar',   async (dados)   => await this.adicionar(dados));
                router.registrar('curso/atualizar',   async (payload) => await this.atualizar(payload.id, payload.dados));
                router.registrar('curso/excluir',     async (id)      => await this.excluir(id));
            }

            async getAll(termo = '') {
                try {
                    const url = termo ? `${this._apiUrl}?termo=${termo}` : this._apiUrl;
                    const res = await fetch(url);
                    const data = await res.json();
                    return data.map(c => new Curso(
                        c._id, c.DTiniIncs, c.DTfimInsc, c.CargaH, c.CargaHTCC, 
                        c.Codiesde, c.Gradeiesde, c.CursoInst, c.IniImediato, 
                        c.IniMat, c.FimMat, c.Matcoord, c.PasSeg
                    ));
                } catch (err) {
                    console.error('Erro ao buscar cursos:', err);
                    return [];
                }
            }

            async buscarPorId(id) {
                try {
                    const res = await fetch(`${this._apiUrl}/${id}`);
                    const c = await res.json();
                    return c ? new Curso(
                        c._id, c.DTiniIncs, c.DTfimInsc, c.CargaH, c.CargaHTCC, 
                        c.Codiesde, c.Gradeiesde, c.CursoInst, c.IniImediato, 
                        c.IniMat, c.FimMat, c.Matcoord, c.PasSeg
                    ) : null;
                } catch (err) {
                    console.error('Erro ao buscar curso por ID:', err);
                    return null;
                }
            }

            async adicionar(dadosCurso) {
                try {
                    const res = await fetch(this._apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dadosCurso)
                    });
                    const c = await res.json();
                    return new Curso(
                        c._id, c.DTiniIncs, c.DTfimInsc, c.CargaH, c.CargaHTCC, 
                        c.Codiesde, c.Gradeiesde, c.CursoInst, c.IniImediato, 
                        c.IniMat, c.FimMat, c.Matcoord, c.PasSeg
                    );
                } catch (err) {
                    console.error('Erro ao adicionar curso:', err);
                    return null;
                }
            }

            async atualizar(id, dados) {
                try {
                    const res = await fetch(`${this._apiUrl}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dados)
                    });
                    return res.ok;
                } catch (err) {
                    console.error('Erro ao atualizar curso:', err);
                    return false;
                }
            }

            async excluir(id) {
                try {
                    const res = await fetch(`${this._apiUrl}/${id}`, {
                        method: 'DELETE'
                    });
                    return res.ok;
                } catch (err) {
                    console.error('Erro ao excluir curso:', err);
                    return false;
                }
            }
        }
        window.cursoController = new CursoController();

        // ==========================================
        // 4) VIEW
        // ==========================================
                // ==========================================
        // 4) VIEW COM CONTROLE DE MODAL PARA CURSOS
        // ==========================================
        let selecionadoId = null;
        let modoModal = 'adicionar';

        function formatarDataBR(dataIso) {
            if (!dataIso) return '';
            const d = new Date(dataIso);
            return d.toLocaleDateString('pt-BR', { timeZone: 'UTC' });
        }

        function formatarDataInput(dataIso) {
            if (!dataIso) return '';
            return dataIso.split('T')[0];
        }

        async function renderCursos(lista) {
            const container = document.getElementById('curso-list');
            container.innerHTML = '';
            
            if (!lista || lista.length === 0) {
                container.innerHTML = '<p class="lista-vazia">Nenhum curso encontrado.</p>';
                return;
            }

            lista.forEach(c => {
                const div = document.createElement('div');
                div.className = 'curso-item' + (c.id === selecionadoId ? ' selecionado' : '');
                
                div.innerHTML = `
                    <strong>${c.CursoInst}</strong>
                    <br><small>
                        Inscrições: ${formatarDataBR(c.DTiniIncs)} até ${formatarDataBR(c.DTfimInsc)} <br>
                        Matrícula: ${formatarDataBR(c.IniMat)} até ${formatarDataBR(c.FimMat)} <br>
                        C.H. Total: ${c.CargaH}h | C.H. TCC: ${c.CargaHTCC}h | Cod/Grade Iesde: ${c.Codiesde} - ${c.Gradeiesde} <br>
                        Início Imediato: ${c.IniImediato ? 'Sim' : 'Não'} | Passaporte Seg.: ${c.PasSeg ? 'Sim' : 'Não'} | Coordenador: ${c.Matcoord} <br>
                        <span style="color:#888;">ID: ${c.id}</span>
                    </small>
                `;
                div.onclick = () => selecionarCurso(c.id);
                container.appendChild(div);
            });
        }

        function selecionarCurso(id) {
            selecionadoId = (selecionadoId === id) ? null : id;
            atualizarBotoes();
            filtrarCursos();
        }

        function atualizarBotoes() {
            const hab = selecionadoId !== null;
            document.getElementById('btn-editar').disabled  = !hab;
            document.getElementById('btn-excluir').disabled = !hab;
        }

        async function filtrarCursos() {
            const termo = document.getElementById('search-input').value;
            const lista = await router.enviar('curso/listar', termo);
            renderCursos(lista);
        }

        // --- FUNÇÕES DE CONTROLE DO MODAL ---
        function abrirModal(modo) {
            modoModal = modo;
            document.getElementById('curso-modal').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('curso-modal').style.display = 'none';
            document.getElementById('modal-CursoInst').value = '';
            document.getElementById('modal-DTiniIncs').value = '';
            document.getElementById('modal-DTfimInsc').value = '';
            document.getElementById('modal-CargaH').value = '';
            document.getElementById('modal-CargaHTCC').value = '';
            document.getElementById('modal-Codiesde').value = '';
            document.getElementById('modal-Gradeiesde').value = '';
            document.getElementById('modal-IniMat').value = '';
            document.getElementById('modal-FimMat').value = '';
            document.getElementById('modal-Matcoord').value = '';
            document.getElementById('modal-IniImediato').checked = false;
            document.getElementById('modal-PasSeg').checked = false;
        }

        function novoCurso() {
            const permissao = localStorage.getItem('usuarioPermissao');
            if (permissao === 'visao' || permissao === 'edicao') {
                alert('Seu nível de acesso não permite adicionar cursos.');
                return;
            }
            document.getElementById('modal-title').innerText = "Adicionar Curso";
            abrirModal('adicionar');
        }

        async function editarCurso() {
            const permissao = localStorage.getItem('usuarioPermissao');
            if (permissao === 'visao') {
                alert('Seu nível de acesso não permite editar cursos.');
                return;
            }
            if (!selecionadoId) return;

            const c = await router.enviar('curso/buscarPorId', selecionadoId);
            if (!c) return;

            document.getElementById('modal-title').innerText = "Editar Curso";
            document.getElementById('modal-CursoInst').value = c.CursoInst;
            document.getElementById('modal-DTiniIncs').value = formatarDataInput(c.DTiniIncs);
            document.getElementById('modal-DTfimInsc').value = formatarDataInput(c.DTfimInsc);
            document.getElementById('modal-CargaH').value = c.CargaH;
            document.getElementById('modal-CargaHTCC').value = c.CargaHTCC;
            document.getElementById('modal-Codiesde').value = c.Codiesde;
            document.getElementById('modal-Gradeiesde').value = c.Gradeiesde;
            document.getElementById('modal-IniMat').value = formatarDataInput(c.IniMat);
            document.getElementById('modal-FimMat').value = formatarDataInput(c.FimMat);
            document.getElementById('modal-Matcoord').value = c.Matcoord;
            document.getElementById('modal-IniImediato').checked = c.IniImediato;
            document.getElementById('modal-PasSeg').checked = c.PasSeg;

            abrirModal('editar');
        }

        async function salvarFormularioModal() {
            const CursoInst = document.getElementById('modal-CursoInst').value.trim();
            const DTiniIncs = document.getElementById('modal-DTiniIncs').value;
            const DTfimInsc = document.getElementById('modal-DTfimInsc').value;
            const CargaH = document.getElementById('modal-CargaH').value;
            const CargaHTCC = document.getElementById('modal-CargaHTCC').value;
            const Codiesde = document.getElementById('modal-Codiesde').value.trim();
            const Gradeiesde = document.getElementById('modal-Gradeiesde').value.trim();
            const IniMat = document.getElementById('modal-IniMat').value;
            const FimMat = document.getElementById('modal-FimMat').value;
            const Matcoord = document.getElementById('modal-Matcoord').value.trim();
            const IniImediato = document.getElementById('modal-IniImediato').checked;
            const PasSeg = document.getElementById('modal-PasSeg').checked;

            if (!CursoInst || !DTiniIncs || !DTfimInsc || !CargaH || !CargaHTCC || !Codiesde || !Gradeiesde || !IniMat || !FimMat || !Matcoord) {
                alert('Por favor, preencha todos os campos do formulário do curso.');
                return;
            }

            const dados = { DTiniIncs, DTfimInsc, CargaH, CargaHTCC, Codiesde, Gradeiesde, CursoInst, IniImediato, IniMat, FimMat, Matcoord, PasSeg };

            if (modoModal === 'adicionar') {
                const novo = await router.enviar('curso/adicionar', dados);
                if (novo) alert(`Curso "${novo.CursoInst}" cadastrado com sucesso!`);
            } else if (modoModal === 'editar') {
                await router.enviar('curso/atualizar', { id: selecionadoId, dados });
            }

            fecharModal();
            await filtrarCursos();
        }

        async function excluirCurso() {
            if (!selecionadoId) return;
            const permissao = localStorage.getItem('usuarioPermissao');
            if (permissao === 'visao' || permissao === 'edicao') {
                alert('Seu nível de acesso não permite excluir cursos.');
                return;
            }

            const c = await router.enviar('curso/buscarPorId', selecionadoId);
            if (!c) return;

            if (confirm(`Remover permanentemente o curso "${c.CursoInst}" do MongoDB?`)) {
                await router.enviar('curso/excluir', selecionadoId);
                selecionadoId = null;
                atualizarBotoes();
                await filtrarCursos();
            }
        }

        async function exportarTXT() {
            const termo = document.getElementById('search-input').value;
            const lista = await router.enviar('curso/listar', termo);

            if (!lista || lista.length === 0) {
                alert('Nenhum curso para exportar.');
                return;
            }

            const linhas = [
                'ID\tCurso\tInício Insc\tFim Insc\tC.H.\tC.H. TCC\tCod Iesde\tGrade Iesde\tIni. Imediato\tIni Mat\tFim Mat\tCoord\tPasSeg',
                ...lista.map(c => `${c.id}\t${c.CursoInst}\t${formatarDataBR(c.DTiniIncs)}\t${formatarDataBR(c.DTfimInsc)}\t${c.CargaH}\t${c.CargaHTCC}\t${c.Codiesde}\t${c.Gradeiesde}\t${c.IniImediato ? 'Sim' : 'Não'}\t${formatarDataBR(c.IniMat)}\t${formatarDataBR(c.FimMat)}\t${c.Matcoord}\t${c.PasSeg ? 'Sim' : 'Não'}`)
            ];

            const conteudo = linhas.join('\r\n');
            const blob = new Blob([conteudo], { type: 'text/plain;charset=utf-8' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');

            const dataHoje = new Date().toISOString().slice(0, 10);
            a.href     = url;
            a.download = `cursos_${dataHoje}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        document.addEventListener('DOMContentLoaded', filtrarCursos);

    </script>
</body>
</html>
