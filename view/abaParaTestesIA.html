
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="../index.css">
    <script src="./sidebar.js"></script>
    <script type="module">
    import ProfessorController from '../controller/ProfessorController.js';

    window.ProfessorController = ProfessorController;
</script>
    
    <style>
        .professor { padding: 10px; border-bottom: 1px solid #ccc; }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .toolbar input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .toolbar .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 14px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-novo   { background-color: #4CAF50; color: white; }
        .btn-editar { background-color: #2196F3; color: white; }
        .btn-excluir{ background-color: #f44336; color: white; }

        .professor.selecionado { background-color: #e8f0fe; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <h2 style="color: white; padding: 20px;">Unoeste</h2>
        <ul>
            <li>
                <a href="./professor.html" class="menu-item">
                <span onclick="toprofessor()">Professor</span>
            </a>
            </li>
            <li>
                <a href="./cursoView.html" class="menu-item">
                    <span onclick="toCurso()">Cursos</span>
                </a>
            </li>
            <li>
                <a href="./listaview.html" class="menu-item">
                    <span onclick="toLista()">disciplina</span>
                </a>
            </li>
            <li>
                <a href="./usuarioView.html" class="menu-item">
                    <span onclick="toUsuario()">Usuários</span>
                </a>
            </li>
        </ul>
    </div>
    <div class="content" id="content">
        <h1>Lista de Professors</h1>
        <div class="content-section">

            <!-- Barra de pesquisa + botões -->
            <div class="toolbar">
                <input type="text" id="search-input" placeholder="Buscar Professor pelo nome..." oninput="filtrarProfessores()" />
                <div class="btn-group">
                    <button class="btn btn-novo" onclick="novoProfessor()">+ Novo Professor</button>
                    <button class="btn btn-editar"  onclick="editarProfessor()">Editar</button>
                    <button class="btn btn-excluir" onclick="excluirProfessor()">Excluir</button>
                </div>
            </div>

            <div id="professor-list"></div>

        </div>
    </div>
    <script src="../controller/ProfessorController.js"></script>
    <script>
    let selecionadoId = null;

    function renderProfessores(lista) {
        const listaElement = document.getElementById('professor-list');
        listaElement.innerHTML = '';

        if (lista.length === 0) {
            listaElement.innerHTML = '<p style="color:#999; text-align:center;">Nenhum professor encontrado.</p>';
            return;
        }

        lista.forEach(prof => {
            const div = document.createElement('div');
            div.className = 'professor-item' + (prof.id === selecionadoId ? ' selecionado' : '');
            
            div.innerHTML = `
                <strong>${prof.id} - ${prof.nome}</strong><br>
                <small>${prof.graduacao} | ${prof.disciplina}</small><br>
                <small>${prof.email} • <span style="color:${prof.status === 'Ativo' ? 'green' : 'red'}">${prof.status}</span></small>
            `;
            
            div.onclick = () => selecionarProfessor(prof.id);
            listaElement.appendChild(div);
        });
    }

    function selecionarProfessor(id) {
        selecionadoId = (selecionadoId === id) ? null : id;
        filtrarProfessores();
    }

    window.filtrarProfessores = function () {
        const termo = document.getElementById('search-input').value;
        const listaFiltrada = professorController.getAll(termo);
        renderProfessores(listaFiltrada);
    };

    window.novoProfessor = function () {
        const nome = prompt('Nome completo do professor:');
        //const email = prompt('E-mail:');
        //const disciplina = prompt('Disciplina principal:');
        const graduacao = prompt('graduação (ex: Doutor, Mestre):');
        //const status = confirm('Professor está Ativo?') ? 'Ativo' : 'Inativo';

        if (!nome || !graduacao) {
            alert('Todos os campos são obrigatórios!');
            return;
        }

        const novoProf = professorController.adicionar({
            nome, graduacao
        });

        filtrarProfessores();
        alert(`Professor ${novoProf.nome} adicionado com sucesso!`);
    };

    window.editarProfessor = function () {
        if (!selecionadoId) {
            alert('Selecione um professor para editar.');
            return;
        }

        const prof = professorController.buscarPorId(selecionadoId);
        if (!prof) return;

        const nome = prompt('Novo nome:', prof.nome);
        //const email = prompt('Novo e-mail:', prof.email);
        //const disciplina = prompt('Nova disciplina:', prof.disciplina);
        const graduacao = prompt('Nova graduação:', prof.graduacao);

        const dados = {};
        if (nome) dados.nome = nome;
        //if (email) dados.email = email;
        //if (disciplina) dados.disciplina = disciplina;
        if (graduacao) dados.graduacao = graduacao;

        professorController.atualizar(selecionadoId, dados);
        filtrarProfessores();
    };

    window.excluirProfessor = function () {
        if (!selecionadoId) {
            alert('Selecione um professor para excluir.');
            return;
        }

        const prof = professorController.buscarPorId(selecionadoId);
        if (confirm(`Tem certeza que deseja excluir "${prof.nome}"?`)) {
            professorController.excluir(selecionadoId);
            selecionadoId = null;
            filtrarProfessores();
        }
    };

    // Inicialização
    window.onload = function() {
        filtrarProfessores();
    };
</script>
</body>
</html>
